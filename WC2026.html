<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor FIFA 2026 - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Style identique à la version précédente pour garder le look premium -->
    <style>
        :root { --bg-dark: #05070a; --card-dark: #0f121d; --accent: #00dfb7; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .fifa-gradient { background: linear-gradient(135deg, #0056b3 0%, #002d5e 100%); }
        .match-card { background: var(--card-dark); border: 1px solid rgba(255, 255, 255, 0.05); }
        .score-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 45px; height: 45px; text-align: center; border-radius: 8px; }
        .nav-link.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Auth Modal -->
    <div id="auth-screen" class="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-4" style="display:none;">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md text-center">
            <h1 class="text-3xl font-black italic mb-6">PREDICTOR 2026</h1>
            <input type="text" id="username-input" placeholder="Votre Pseudo" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-white mb-4 text-center font-bold">
            <button id="btn-login" class="w-full fifa-gradient text-white font-black py-4 rounded-xl">REJOINDRE</button>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-slate-950/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="font-black italic text-lg">FIFA 26</span>
            <nav class="flex gap-4">
                <button onclick="switchTab('matches')" id="tab-matches" class="nav-link active font-bold text-xs uppercase">Matchs</button>
                <button onclick="switchTab('ranking')" id="tab-ranking" class="nav-link font-bold text-xs uppercase">Classement</button>
                <button onclick="switchTab('admin')" id="tab-admin" class="nav-link font-bold text-xs uppercase">Admin</button>
            </nav>
            <div id="user-info" class="text-xs font-bold text-emerald-400">0 PTS</div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto w-full p-4">
        <div id="section-matches" class="space-y-6">
            <div id="matches-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
        <div id="section-ranking" class="hidden">
            <div class="bg-slate-900 rounded-2xl overflow-hidden border border-slate-800">
                <table class="w-full text-left">
                    <tbody id="ranking-body"></tbody>
                </table>
            </div>
        </div>
        <div id="section-admin" class="hidden">
            <div id="admin-list" class="space-y-3"></div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-500 text-white px-6 py-2 rounded-full opacity-0 transition-all pointer-events-none"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURATION À REMPLACER PAR VOS CLÉS FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDLxfDxHAmg3BDTysrapAmn2hf7iI6FjX8",
            authDomain: "wc2026-1d20e.firebaseapp.com",
            projectId: "wc2026-1d20e",
            storageBucket: "wc2026-1d20e.firebasestorage.app",
            messagingSenderId: "1050459709163",
            appId: "1:1050459709163:web:d7959dd63de0572ec2e8ae"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "world-cup-2026-prod"; // ID unique pour votre collection

        let currentUser = null;
        let matches = [];

        // Auth
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const name = localStorage.getItem('fifa_name');
                if (!name) document.getElementById('auth-screen').style.display = 'flex';
                else initAppData(name);
            } else {
                signInAnonymously(auth);
            }
        });

        document.getElementById('btn-login').onclick = () => {
            const name = document.getElementById('username-input').value.trim();
            if (name) {
                localStorage.setItem('fifa_name', name);
                initAppData(name);
                document.getElementById('auth-screen').style.display = 'none';
            }
        };

        async function initAppData(name) {
            // Création profil
            const profileRef = doc(db, 'pronos', appId, 'users', currentUser.uid);
            const snap = await getDoc(profileRef);
            if (!snap.exists()) await setDoc(profileRef, { username: name, points: 0, corrects: 0 });

            // Listeners
            onSnapshot(collection(db, 'pronos', appId, 'matches'), s => {
                matches = s.docs.map(d => d.data());
                renderMatches();
                renderAdmin();
            });

            onSnapshot(collection(db, 'pronos', appId, 'users'), s => {
                const ranks = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.points - a.points);
                renderRanking(ranks);
                const me = ranks.find(r => r.id === currentUser.uid);
                if (me) document.getElementById('user-info').innerText = `${me.username} : ${me.points} PTS`;
            });

            // Récupération des pronos de l'utilisateur
            onSnapshot(collection(db, 'pronos', appId, 'users', currentUser.uid, 'user_predictions'), s => {
                window.userPredictions = {};
                s.docs.forEach(d => window.userPredictions[d.id] = d.data());
                renderMatches();
            });
        }

        // Fonctions de rendu et logique (identiques à la version précédente)
        // ... (Omis ici pour la brièveté mais identique au code fonctionnel)
        
        window.switchTab = (tab) => {
            ['matches', 'ranking', 'admin'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('active');
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('active');
        };

        function renderMatches() {
            const list = document.getElementById('matches-list');
            const now = new Date();
            list.innerHTML = matches.map(m => {
                const locked = now > new Date(m.date);
                const p = (window.userPredictions && window.userPredictions[m.id]) || { a: '', b: '' };
                return `
                    <div class="match-card p-4 rounded-xl">
                        <div class="text-[10px] text-slate-500 font-bold mb-2 uppercase">${m.teamA} VS ${m.teamB}</div>
                        <div class="flex items-center justify-between">
                            <span>${m.teamA}</span>
                            <div class="flex gap-2">
                                <input type="number" value="${p.a}" onchange="saveP('${m.id}', 'a', this.value)" ${locked ? 'disabled' : ''} class="score-input">
                                <input type="number" value="${p.b}" onchange="saveP('${m.id}', 'b', this.value)" ${locked ? 'disabled' : ''} class="score-input">
                            </div>
                            <span>${m.teamB}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.saveP = async (id, side, val) => {
            const ref = doc(db, 'pronos', appId, 'users', currentUser.uid, 'user_predictions', id);
            const update = {}; update[side] = parseInt(val);
            await setDoc(ref, update, { merge: true });
        }

        function renderRanking(ranks) {
            const body = document.getElementById('ranking-body');
            body.innerHTML = ranks.map((r, i) => `
                <tr class="border-b border-white/5">
                    <td class="p-4 font-bold">${i+1}</td>
                    <td class="p-4">${r.username}</td>
                    <td class="p-4 text-right font-black">${r.points}</td>
                </tr>
            `).join('');
        }

        function renderAdmin() {
            const list = document.getElementById('admin-list');
            list.innerHTML = matches.map(m => `
                <div class="flex justify-between p-2 bg-slate-900 rounded">
                    <span>${m.teamA}/${m.teamB}</span>
                    <button onclick="res('${m.id}')" class="text-xs bg-emerald-600 px-2 rounded">Valider Score</button>
                </div>
            `).join('');
        }

    </script>
</body>
</html>
